name: SPIR Improvement Workflow
commandName: improve
sessionNamePrefix: 'SPIR✨: '
sessionNameMaxLength: 50
initialMessage: |
  Start the {workflowName} for: "{description}"

  Begin with Phase 1 ({firstPhaseName}).

  Focus on auditing the codebase for code-smells, dead code, repeat implementations, monolith files, poor test coverage, invalid or incomplete logic, incomplete UI/UX, repeat implementations, and linting issues. Then plan and implement improvements — not new features.
phases:
  - { subworkflow: research }
  - { subworkflow: planning }
  - { subworkflow: implement }
  - { subworkflow: review }
  - { subworkflow: update-docs }
