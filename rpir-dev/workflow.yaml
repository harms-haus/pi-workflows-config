name: RPIR Development Workflow
commandName: rpir-dev
sessionNamePrefix: 'RPIR: '
sessionNameMaxLength: 50
initialMessage: |
  Start the {workflowName} for: "{description}"

  Begin with Phase 1 ({firstPhaseName}).
phases:
  - { subworkflow: rpir-research }
  - { subworkflow: rpir-planning }
  - { subworkflow: rpir-implement }
  - { subworkflow: rpir-review }
  - { subworkflow: rpir-update-docs }
